<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#09101A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 28px 'Segoe UI', Inter, Arial, sans-serif; fill: #E5E7EB; }
      .text { font: 500 18px 'Segoe UI', Inter, Arial, sans-serif; fill: #E5E7EB; }
      .muted { font: 500 16px 'Segoe UI', Inter, Arial, sans-serif; fill: #94A3B8; }
      .small { font: 600 14px 'Segoe UI', Inter, Arial, sans-serif; fill: #BFDBFE; }
      .label { font: 700 17px 'Segoe UI', Inter, Arial, sans-serif; fill: #E5E7EB; }
      .tiny { font: 600 13px 'Segoe UI', Inter, Arial, sans-serif; fill: #CBD5E1; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="48" y="36" width="1344" height="828" rx="26" fill="#0A0F1A" stroke="#1F2937" filter="url(#shadow)"/>

  <!-- Header -->
