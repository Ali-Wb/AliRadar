    <rect x="212" y="0" width="74" height="34" rx="10" fill="#1F2937"/>
    <text x="232" y="22" class="tiny">BLE: 91</text>
    <rect x="300" y="0" width="104" height="34" rx="10" fill="#1F2937"/>
